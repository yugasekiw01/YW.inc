<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 カイダシ</title>
    <meta name="description" content="イベントごとに買い出しと割り勘をみんなで管理！">
    <meta property="og:title" content="🛒 カイダシ">
    <meta property="og:description" content="イベントごとに買い出しと割り勘をみんなで管理！">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
    <!-- PWA対応 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1ABC9C">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="カイダシ">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Yomogi', -apple-system, sans-serif;
            background: linear-gradient(160deg, #E8FAF4 0%, #F0FBF7 50%, #E4F7EF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(26,188,156,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(46,204,113,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ---- ヒーロー ---- */
        .hero {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }
        .hero-icon {
            font-size: 5.5rem;
            margin-bottom: 12px;
            display: block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 16px rgba(26,188,156,0.25));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50%       { transform: translateY(-12px) rotate(2deg); }
        }
        .hero h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #1ABC9C, #27AE60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: 0.08em;
        }
        .hero p {
            font-size: 0.95rem;
            color: #7ABFB0;
        }
        .hero-deco {
            font-size: 0.85rem;
            margin-top: 4px;
            color: #A8D8CC;
            letter-spacing: 0.1em;
        }

        /* ---- カード ---- */
        .card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 26px 22px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(26,188,156,0.10), 0 1px 0 rgba(255,255,255,0.9) inset;
            margin-bottom: 14px;
            border: 1.5px solid rgba(200,237,230,0.6);
            position: relative;
            z-index: 1;
        }
        .card-title {
            font-size: 0.95rem;
            color: #1ABC9C;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ---- 入力 ---- */
        input[type="text"] {
            width: 100%;
            border: 2px solid #C8EDE6;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 1.05rem;
            font-family: inherit;
            outline: none;
            background: #F7FDFB;
            color: #2C7A6C;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            margin-bottom: 12px;
        }
        input[type="text"]:focus {
            border-color: #1ABC9C;
            box-shadow: 0 0 0 4px rgba(26,188,156,0.12);
            background: white;
        }
        input[type="text"]::placeholder { color: #B2D8D0; }

        /* ---- ボタン ---- */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #1ABC9C 0%, #2ECC71 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 6px 20px rgba(26,188,156,0.4), 0 1px 0 rgba(255,255,255,0.3) inset;
            letter-spacing: 0.06em;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            border-radius: inherit;
        }
        .btn-primary:hover  { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(26,188,156,0.5); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { background: linear-gradient(135deg, #A8E6DA, #B8F0C8); box-shadow: none; cursor: default; transform: none; }

        /* ---- エラー ---- */
        .error-msg { font-size: 0.88rem; color: #E74C3C; margin-top: -6px; margin-bottom: 10px; min-height: 1.2em; }

        /* ---- 最近のイベント ---- */
        .recent-list { display: flex; flex-direction: column; gap: 10px; }
        .recent-item {
            display: flex; align-items: center; gap: 12px;
            background: linear-gradient(135deg, #F0FBF7, #E8F8F2);
            border-radius: 18px; padding: 14px 16px;
            cursor: pointer; transition: all 0.2s; text-decoration: none;
            border: 1.5px solid rgba(200,237,230,0.5);
        }
        .recent-item:hover { background: linear-gradient(135deg, #D5F5EC, #C8F0E4); transform: translateX(5px) scale(1.01); box-shadow: 0 4px 14px rgba(26,188,156,0.15); }
        .recent-icon { font-size: 1.5rem; flex-shrink: 0; }
        .recent-info { flex: 1; min-width: 0; }
        .recent-name { font-size: 1rem; color: #2C7A6C; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-code { font-size: 0.75rem; color: #8ABFB0; margin-top: 2px; }
        .recent-arrow { font-size: 1.2rem; color: #1ABC9C; flex-shrink: 0; }
        .recent-delete {
            background: #FFF0F0; border: none; color: #FFAAAA;
            cursor: pointer; font-size: 0.9rem; padding: 6px 10px;
            border-radius: 10px; transition: color 0.18s, background 0.18s;
            flex-shrink: 0;
        }
        .recent-delete:hover { color: #E74C3C; background: #FFE0E0; }
        .no-recent { text-align: center; color: #B2D8D0; font-size: 0.9rem; padding: 8px 0; }

        /* ---- 作成成功モーダル ---- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; padding: 24px;
        }
        .modal.hidden { display: none; }
        .modal-box {
            background: white; border-radius: 32px; padding: 32px 24px;
            width: 100%; max-width: 360px; text-align: center;
            box-shadow: 0 24px 64px rgba(26,188,156,0.2);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1.5px solid rgba(200,237,230,0.6);
        }
        @keyframes popIn {
            from { transform: scale(0.82) translateY(20px); opacity: 0; }
            to   { transform: scale(1)    translateY(0);    opacity: 1; }
        }
        .modal-icon { font-size: 4rem; margin-bottom: 12px; display: block; animation: bounce 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes bounce { from { transform: scale(0); } to { transform: scale(1); } }
        .modal-box h2 { font-size: 1.4rem; margin-bottom: 6px; color: #1ABC9C; }
        .modal-box p  { font-size: 0.9rem; color: #8ABFB0; margin-bottom: 18px; }
        .url-display {
            background: #F0FBF7; border: 2px dashed #A8DED4; border-radius: 16px;
            padding: 14px 16px; font-size: 0.8rem; color: #1ABC9C;
            word-break: break-all; margin-bottom: 10px; cursor: pointer; transition: all 0.18s;
        }
        .url-display:hover { background: #D5F5EC; border-color: #1ABC9C; }
        .copy-hint { font-size: 0.82rem; color: #B2D8D0; margin-bottom: 18px; }
        .copy-hint.copied { color: #1ABC9C; }
        .btn-open {
            width: 100%; background: linear-gradient(135deg, #1ABC9C, #2ECC71); color: white;
            border: none; border-radius: 16px; padding: 16px; font-size: 1.1rem;
            font-family: inherit; cursor: pointer;
            box-shadow: 0 6px 20px rgba(26,188,156,0.4); margin-bottom: 10px; transition: transform 0.15s;
        }
        .btn-open:hover { transform: translateY(-2px); }
        .btn-close {
            width: 100%; background: #F5F5F5; color: #AAA; border: none;
            border-radius: 16px; padding: 13px; font-size: 0.95rem; font-family: inherit; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="hero">
    <span class="hero-icon">🛒</span>
    <h1>カイダシ</h1>
    <p>みんなで買い出し・割り勘を管理しよう！</p>
    <div class="hero-deco">✦ ✦ ✦</div>
</div>

<!-- イベント作成 -->
<div class="card">
    <div class="card-title">🌿 新しいイベントを作成</div>
    <input type="text" id="event-name-input"
        placeholder="例: 夏の買い出し・歓迎会の準備"
        maxlength="30" autocomplete="off" />
    <div class="error-msg" id="create-error"></div>
    <button class="btn-primary" id="create-btn">🛒 イベントを作成する</button>
</div>

<!-- 最近のイベント -->
<div class="card">
    <div class="card-title">🕐 最近のイベント</div>
    <div class="recent-list" id="recent-list">
        <div class="no-recent">まだ参加したイベントはありません</div>
    </div>
</div>

<!-- 作成成功モーダル -->
<div class="modal hidden" id="success-modal">
    <div class="modal-box">
        <span class="modal-icon">🎉</span>
        <h2>イベント作成完了！</h2>
        <p>URLをみんなに共有しましょう</p>
        <div class="url-display" id="event-url" onclick="copyUrl()"></div>
        <div class="copy-hint" id="copy-hint">タップでコピー</div>
        <button class="btn-open" id="open-btn">このイベントを開く 🛒</button>
        <button class="btn-close" onclick="closeModal()">あとで開く</button>
    </div>
</div>

<script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    integrity="sha384-4eCDoMN/7A46qQ5Tj0rZ/D2VEolFGNIINDTLAcWZcvhkRSsvTfqNfaBMlRRoGEZ5"
    crossorigin="anonymous"
    onerror="document.body.innerHTML='<p style=padding:20px;color:red>リソースの読み込みに失敗しました。ページを再読み込みしてください。</p>'">
</script>
<script>
const SUPABASE_URL      = 'https://akovhthopauhmlbcjjfw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrb3ZodGhvcGF1aG1sYmNqamZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjgxMzgsImV4cCI6MjA5NDUwNDEzOH0.BZPdBmMm6kGbcwCavUFj5xGoQqaS5r3T9E7kjXWlqKI';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function generateEventCode() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(8)))
        .map(b => chars[b % chars.length]).join('');
}

function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadRecentEvents() {
    let recent = [];
    try { recent = JSON.parse(localStorage.getItem('kaidashi_recent') || '[]'); } catch {}
    const listEl = document.getElementById('recent-list');
    if (!recent.length) {
        listEl.innerHTML = '<div class="no-recent">まだ参加したイベントはありません</div>';
        return;
    }
    listEl.innerHTML = recent.slice(0, 5).map(ev => `
        <div class="recent-item" onclick="location.href='app.html?event=${encodeURIComponent(ev.code)}'">
            <span class="recent-icon">🛒</span>
            <div class="recent-info">
                <div class="recent-name">${esc(ev.name)}</div>
                <div class="recent-code">コード: ${esc(ev.code)}</div>
            </div>
            <button class="recent-delete" onclick="event.stopPropagation(); deleteEvent('${esc(ev.code)}', '${esc(ev.name)}')">🗑️</button>
            <span class="recent-arrow">›</span>
        </div>`).join('');
}

function saveRecentEvent(code, name) {
    let recent = [];
    try { recent = JSON.parse(localStorage.getItem('kaidashi_recent') || '[]'); } catch {}
    recent = recent.filter(ev => ev.code !== code);
    recent.unshift({ code, name });
    localStorage.setItem('kaidashi_recent', JSON.stringify(recent.slice(0, 10)));
}

let createdEventUrl = '';

async function createEvent() {
    const nameInput = document.getElementById('event-name-input');
    const errorEl   = document.getElementById('create-error');
    const btn       = document.getElementById('create-btn');
    const name      = nameInput.value.trim();

    if (!name) { errorEl.textContent = 'イベント名を入力してください'; nameInput.focus(); return; }
    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = '作成中…';

    try {
        const event_code = generateEventCode();
        const { data, error } = await sb.from('events')
            .insert({ event_code, name }).select().single();

        if (error) { errorEl.textContent = '作成に失敗しました。もう一度お試しください。'; return; }

        saveRecentEvent(data.event_code, data.name);
        createdEventUrl = `${location.origin}${location.pathname.replace('index.html','')}app.html?event=${data.event_code}`;

        document.getElementById('event-url').textContent = createdEventUrl;
        document.getElementById('success-modal').classList.remove('hidden');
        document.getElementById('open-btn').onclick = () => { location.href = `app.html?event=${data.event_code}`; };
        nameInput.value = '';
        loadRecentEvents();
    } finally {
        btn.disabled = false;
        btn.textContent = '🛒 イベントを作成する';
    }
}

function copyUrl() {
    navigator.clipboard.writeText(createdEventUrl).then(() => {
        const hint = document.getElementById('copy-hint');
        hint.textContent = 'コピーしました！✓';
        hint.classList.add('copied');
        setTimeout(() => { hint.textContent = 'タップでコピー'; hint.classList.remove('copied'); }, 2000);
    });
}

function closeModal() { document.getElementById('success-modal').classList.add('hidden'); }

async function deleteEvent(code, name) {
    if (!confirm(`「${name}」を削除しますか？\n\n⚠️ このイベントの全てのデータが削除されます。`)) return;
    try {
        // イベントIDを取得
        const { data: ev } = await sb.from('events').select('id').eq('event_code', code).single();
        if (ev) {
            // 関連データを全て削除
            await sb.from('items').delete().eq('event_id', ev.id);
            await sb.from('participants').delete().eq('event_id', ev.id);
            await sb.from('warikan_entries').delete().eq('event_id', ev.id);
            await sb.from('events').delete().eq('id', ev.id);
        }
        // ローカル履歴から削除
        let recent = []; try { recent = JSON.parse(localStorage.getItem('kaidashi_recent') || '[]'); } catch {}
        recent = recent.filter(e => e.code !== code);
        localStorage.setItem('kaidashi_recent', JSON.stringify(recent));
        loadRecentEvents();
    } catch (e) {
        console.error('Delete error:', e);
        alert('削除に失敗しました');
    }
}

document.getElementById('create-btn').addEventListener('click', createEvent);
document.getElementById('event-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') createEvent(); });

loadRecentEvents();

// Service Worker登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg))
      .catch(err => console.error('SW registration failed:', err));
  });
}
</script>
</body>
</html>
