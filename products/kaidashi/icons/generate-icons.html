<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>カイダシ アイコン生成</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .preview { margin: 20px 0; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .download-links { margin-top: 20px; }
        .download-links a { display: inline-block; margin: 10px; padding: 10px 20px; background: #1ABC9C; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>カイダシ PWAアイコン生成</h1>
    <p>下のボタンをクリックしてアイコンをダウンロードしてください</p>

    <div class="preview">
        <canvas id="canvas192" width="192" height="192"></canvas>
        <canvas id="canvas512" width="512" height="512"></canvas>
    </div>

    <div class="download-links">
        <a id="download192" download="icon-192.png">192x192 ダウンロード</a>
        <a id="download512" download="icon-512.png">512x512 ダウンロード</a>
    </div>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');

            // 背景
            ctx.fillStyle = '#1ABC9C';
            ctx.fillRect(0, 0, size, size);

            // テキスト
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.12}px "Zen Maru Gothic", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('KAIDASHI', size / 2, size / 2);
        }

        // フォントロード後に描画
        document.fonts.ready.then(() => {
            const canvas192 = document.getElementById('canvas192');
            const canvas512 = document.getElementById('canvas512');

            drawIcon(canvas192, 192);
            drawIcon(canvas512, 512);

            // ダウンロードリンク設定
            document.getElementById('download192').href = canvas192.toDataURL('image/png');
            document.getElementById('download512').href = canvas512.toDataURL('image/png');
        });
    </script>
</body>
</html>
